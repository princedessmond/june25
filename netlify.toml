# Netlify Configuration File
# This file tells Netlify how to build and deploy your site

[build]
  # No build command needed (static HTML site)
  publish = "."

[build.environment]
  # Environment variables (none needed for static site)

[[redirects]]
  # Redirect all 404s to index.html (for single-page app behavior)
  from = "/*"
  to = "/index.html"
  status = 200
